services:
  - type: web
    name: edualerta-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false
    healthCheckPath: /health

databases:
  - name: edualerta-db
    plan: starter
    databaseName: edualerta
    user: edualerta
